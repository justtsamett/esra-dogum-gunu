<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esra & Samet | Multiverse</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Orbitron:wght@400;900&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <div id="gate">
        <div class="hologram-box">
            <h1 class="orbitron">ACCESS DENIED</h1>
            <p>Biyometrik doğrulama: "Kısa ve Küçük"</p>
            <input type="text" id="pass" placeholder="Şifreleme Anahtarı">
            <button class="glow-btn" onclick="initUniverse()">SİSTEMİ BAŞLAT</button>
        </div>
    </div>

    <div id="universe">
        <div class="layer star-1"></div>
        <div class="layer star-2"></div>
        <div class="layer nebula"></div>
    </div>

    <main id="app">
        <header id="hud">
            <div class="hud-item">
                <span>HEDEF:</span> <strong class="gold">ESRA</strong>
            </div>
            <div id="timer" class="orbitron">00:00:00:00</div>
            <div class="hud-item">
                <span>KONUM:</span> <strong id="location-name">Zaman Boşluğu</strong>
            </div>
        </header>

        <div id="train-viewport">
            <div id="train-track">
                </div>
        </div>

        <div class="artifact scarf" onclick="openPortal('aot')">🧣</div>
        <div class="artifact discord-logo" onclick="openPortal('terminal')">👾</div>
    </main>

    <div id="portal-overlay" class="hidden">
        <button onclick="closePortal()" class="close-btn">X</button>
        <div id="portal-content"></div>
    </div>

    <audio id="bg-music" loop><source src="muzik.mp3" type="audio/mpeg"></audio>
    <script src="script.js"></script>
</body>
</html>
