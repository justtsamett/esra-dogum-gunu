<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsuzluk İstasyonu | Esra</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #2a0a4d; --neon: #bc13fe; --gold: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }

        /* 1. GİRİŞ EKRANI */
        #gate {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .gate-input {
            background: transparent; border: 1px solid var(--neon); padding: 15px; color: white;
            border-radius: 30px; text-align: center; width: 280px; font-size: 1rem; outline: none;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.2);
        }

        /* 2. FOTOĞRAF MATRİSİ (GRID) */
        #photo-wall {
            position: fixed; inset: 0; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            z-index: 8000; pointer-events: none; opacity: 0; transition: 1s;
        }
        .photo-item {
            width: 100%; height: 120px; object-fit: cover; opacity: 0;
            transform: scale(0.5); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #neon-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Dancing Script', cursive; font-size: 5rem; color: #fff;
            text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon);
            z-index: 8500; opacity: 0; text-align: center; pointer-events: none;
        }

        /* 3. ANA EVREN (MOR & YILDIZLAR) */
        #main-universe {
            position: fixed; inset: 0; opacity: 0; display: none;
            background: radial-gradient(circle at center, #1a0633 0%, #05010a 100%);
            z-index: 1000;
        }
        .stars {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.3;
        }
        .moons { position: absolute; top: 10%; right: 10%; font-size: 3rem; opacity: 0.2; }

        /* 4. ANALOG SAAT (TOZDAN VAR OLMA) */
        #clock-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px; z-index: 2000; opacity: 0;
            filter: blur(10px); transition: 3s ease-out;
        }
        .analog-clock {
            width: 100%; height: 100%; border: 4px solid var(--gold);
            border-radius: 50%; position: relative; background: rgba(0,0,0,0.4);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        .brand {
            position: absolute; top: 30%; width: 100%; text-align: center;
            font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--gold); letter-spacing: 3px;
        }
        .hand {
            position: absolute; bottom: 50%; left: 50%; transform-origin: bottom;
            background: white; border-radius: 10px; transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hour { width: 6px; height: 70px; background: var(--gold); z-index: 3; }
        .minute { width: 4px; height: 100px; background: #fff; z-index: 2; }
        .center-dot {
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px;
            background: var(--gold); border-radius: 50%; transform: translate(-50%, -50%); z-index: 4;
        }
        #clock-date {
            position: absolute; bottom: -60px; width: 100%; text-align: center;
            font-family: 'Orbitron'; font-size: 1.5rem; color: #fff; opacity: 0; transition: 1s;
        }

    </style>
</head>
<body>

    <div id="gate">
        <p style="color: #888; font-size: 12px; margin-bottom: 10px;">"Senin için biraz kısa ve küçük olabilir..."</p>
        <input type="password" id="pass" class="gate-input" placeholder="Şifre">
        <button onclick="unlock()" style="margin-top:20px; background:var(--neon); color:white; border:none; padding:10px 30px; border-radius:20px; cursor:pointer;">Başlat</button>
    </div>

    <div id="photo-wall"></div>
    <div id="neon-text">İyi ki doğdun güzel sevgilimm</div>

    <div id="main-universe">
        <div class="stars"></div>
        <div class="moons">🌙</div>
        
        <div id="clock-container">
            <div class="analog-clock">
                <div class="brand">MAYA</div>
                <div id="hour-hand" class="hand hour"></div>
                <div id="min-hand" class="hand minute"></div>
                <div class="center-dot"></div>
            </div>
            <div id="clock-date">4 Nisan 2009</div>
        </div>
    </div>

    <audio id="music" loop><source src="MUZIK.mp3" type="audio/mpeg"></audio>

    <script>
        const photoWall = document.getElementById('photo-wall');
        const totalPhotos = 150; // İstediğin miktar

        // Fotoğrafları hazırlama (İsimleri senin klasörüne göre olmalı, örn: 1.jpg, 2.jpg)
        function createPhotos() {
            for(let i=1; i <= totalPhotos; i++) {
                const img = document.createElement('img');
                img.src = `img/${i}.jpg`; // Fotoğrafların "img" klasöründe 1.jpg, 2.jpg... diye gitmeli
                img.className = 'photo-item';
                photoWall.appendChild(img);
            }
        }
        createPhotos();

        function unlock() {
            const pass = document.getElementById('pass').value.toLowerCase().trim();
            if(pass === "kısa ve küçük") {
                document.getElementById('gate').style.display = "none";
                document.getElementById('music').play();
                startPhotoFlow();
            } else { alert("Şaka böyle değildi sanki? :)"); }
        }

        // 1. FOTOĞRAF AKIŞI
        function startPhotoFlow() {
            photoWall.style.opacity = "1";
            const items = document.querySelectorAll('.photo-item');
            
            items.forEach((item, index) => {
                setTimeout(() => {
                    item.style.opacity = "1";
                    item.style.transform = "scale(1)";
                }, index * 40); // Fotoğrafların tek tek açılma hızı
            });

            // Fotoğraflar bittikten sonra neon yazı
            setTimeout(() => {
                document.getElementById('neon-text').style.opacity = "1";
                
                // Her şeyin sönmesi
                setTimeout(() => {
                    document.getElementById('photo-wall').style.opacity = "0";
                    document.getElementById('neon-text').style.opacity = "0";
                    setTimeout(initUniverse, 1500);
                }, 4000);
            }, items.length * 40 + 1000);
        }

        // 2. MOR EVREN VE ANALOG SAAT
        function initUniverse() {
            const universe = document.getElementById('main-universe');
            const clock = document.getElementById('clock-container');
            universe.style.display = "block";
            
            setTimeout(() => {
                universe.style.opacity = "1";
                // Tozdan var olma efekti
                clock.style.opacity = "1";
                clock.style.filter = "blur(0px)";
                startClockAnimation();
            }, 500);
        }

        function startClockAnimation() {
            const hHand = document.getElementById('hour-hand');
            const mHand = document.getElementById('min-hand');
            
            // Başlangıç: 22:10
            // Saat 22 = 300 derece (12'den itibaren 22*30)
            // Dakika 10 = 60 derece (10*6)
            hHand.style.transform = `translate(-50%, 0) rotate(300deg)`;
            mHand.style.transform = `translate(-50%, 0) rotate(60deg)`;

            // 3 saniye sonra 00:00'a geçiş
            setTimeout(() => {
                hHand.style.transform = `translate(-50%, 0) rotate(360deg)`;
                mHand.style.transform = `translate(-50%, 0) rotate(360deg)`;
                
                // Küçülme ve yukarı yerleşme
                setTimeout(() => {
                    const container = document.getElementById('clock-container');
                    container.style.transition = "2s ease-in-out";
                    container.style.top = "20%";
                    container.style.transform = "translate(-50%, -50%) scale(0.6)";
                    
                    // Tarihin belirmesi
                    setTimeout(() => {
                        document.getElementById('clock-date').style.opacity = "1";
                    }, 1500);
                }, 2500);
            }, 3000);
        }
    </script>
</body>
</html>
