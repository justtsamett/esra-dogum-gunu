<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsuzluk İstasyonu | Esra</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #2a0a4d; --neon: #bc13fe; --gold: #ffd700; --deep: #05010a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }

        /* GİRİŞ VE FOTO DUVARI AYNI KALIYOR (V4.2'DEN) */
        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gate-input { background: transparent; border: 1px solid var(--neon); padding: 15px; color: white; border-radius: 30px; text-align: center; width: 260px; outline: none; }
        .gate-btn { margin-top: 20px; background: var(--neon); color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #photo-wall { position: fixed; inset: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); z-index: 8000; pointer-events: none; opacity: 0; transition: 1.5s; }
        .photo-item { width: 100%; height: 130px; object-fit: cover; opacity: 0; transform: scale(0.5); transition: 0.5s; }
        
        #neon-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Dancing Script', cursive; font-size: 5rem; color: #fff; text-shadow: 0 0 30px var(--neon); z-index: 8500; opacity: 0; transition: 2.5s; pointer-events: none; }

        /* ANA EVREN */
        #main-universe { position: fixed; inset: 0; opacity: 0; display: none; background: radial-gradient(circle at center, #1a0633 0%, #05010a 100%); z-index: 1000; }
        .nebula { position: absolute; width: 150%; height: 150%; top: -25%; left: -25%; background: radial-gradient(circle at 30% 30%, rgba(106, 27, 154, 0.15), transparent 40%), radial-gradient(circle at 70% 70%, rgba(188, 19, 254, 0.1), transparent 40%); filter: blur(60px); animation: nebulaRoam 20s infinite alternate; }
        @keyframes nebulaRoam { from { transform: translate(0,0); } to { transform: translate(5%, 5%); } }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--t) infinite; opacity: 0.3; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

        /* SAAT VE SAYAÇLAR */
        #clock-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; z-index: 2000; opacity: 0; filter: blur(15px); transition: 3s ease-out; }
        .analog-clock { width: 100%; height: 100%; border: 2px solid rgba(255, 215, 0, 0.3); border-radius: 50%; position: relative; backdrop-filter: blur(5px); }
        .brand { position: absolute; top: 28%; width: 100%; text-align: center; font-family: 'Dancing Script', cursive; font-size: 2rem; color: #fff; text-shadow: 0 0 10px var(--neon); }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; transition: transform 3s; }
        .hour { width: 6px; height: 75px; background: var(--gold); z-index: 3; }
        .minute { width: 4px; height: 100px; background: #fff; z-index: 2; }
        
        /* METİN VE SAYAÇ ALANLARI */
        .content-layer { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 5vh; opacity: 0; transition: 2s; }
        .sub-text { font-family: 'Dancing Script'; font-size: 2.2rem; color: #fff; margin-bottom: 20px; text-shadow: 0 0 10px var(--neon); }
        
        .timer-grid { display: flex; width: 90%; justify-content: space-between; align-items: flex-start; margin-top: 40px; }
        .timer-box { width: 40%; text-align: center; }
        .timer-val { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--gold); margin-bottom: 10px; line-height: 1.6; }
        .timer-label { font-family: 'Dancing Script'; font-size: 2.5rem; color: #fff; text-shadow: 0 0 15px var(--neon); }
        
        .final-msg { font-family: 'Dancing Script'; font-size: 2.8rem; color: #fff; margin-top: 50px; text-shadow: 0 0 20px var(--gold); opacity: 0; transition: 3s; }

    </style>
</head>
<body>

    <div id="gate">
        <input type="password" id="pass" class="gate-input" placeholder="Şifreleme Anahtarı">
        <button class="gate-btn" onclick="start()">GİRİŞ YAP</button>
    </div>

    <div id="photo-wall"></div>
    <div id="neon-text">İyi ki doğdun güzel sevgilim</div>

    <div id="main-universe">
        <div class="nebula"></div>
        <div id="star-field"></div>
        
        <div id="clock-container">
            <div class="analog-clock">
                <div class="brand">Esram</div>
                <div id="hour-hand" class="hand hour"></div>
                <div id="min-hand" class="hand minute"></div>
                <div class="center-dot"></div>
            </div>
        </div>

        <div class="content-layer" id="content-ui">
            <div class="sub-text" id="birth-text">4 Nisan 2009 <br> <span style="font-size:1.8rem; opacity:0.8;">Güzelimin dünyaya gelip;</span></div>
            
            <div class="timer-grid">
                <div class="timer-box">
                    <div id="life-timer" class="timer-val"></div>
                    <div class="timer-label">Dünyayı,</div>
                </div>
                <div class="timer-box">
                    <div id="love-timer" class="timer-val"></div>
                    <div class="timer-label">Dünyamı,</div>
                </div>
            </div>

            <div class="final-msg" id="final-msg">Aydınlatıyorsun balımm <33</div>
        </div>
    </div>

    <audio id="music" loop><source src="MUZIK.mp3" type="audio/mpeg"></audio>

    <script>
        // 1. Atmosfer (Yıldızlar vb.)
        function createAtmos() {
            const field = document.getElementById('star-field');
            for(let i=0; i<120; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.width = Math.random() * 3 + 'px';
                s.style.height = s.style.width;
                s.style.setProperty('--t', (2 + Math.random() * 4) + 's');
                field.appendChild(s);
            }
        }
        createAtmos();

        // 2. Fotoğraflar
        function createPhotos() {
            const wall = document.getElementById('photo-wall');
            for(let i=1; i <= 150; i++) {
                const img = document.createElement('img');
                img.src = `img/${i}.jpg`; // Klasöründeki gerçek fotolar
                img.onerror = function() { this.src = `https://picsum.photos/200/300?random=${i}`; }; // Bulamazsa test fotosu
                img.className = 'photo-item';
                wall.appendChild(img);
            }
        }
        createPhotos();

        function start() {
            if(document.getElementById('pass').value.toLowerCase().trim() === "kısa ve küçük") {
                document.getElementById('gate').style.display = "none";
                document.getElementById('music').play();
                startFlow();
            } else { alert("Şifre hatalı Samet."); }
        }

        function startFlow() {
            const wall = document.getElementById('photo-wall');
            const text = document.getElementById('neon-text');
            wall.style.opacity = "1";
            document.querySelectorAll('.photo-item').forEach((item, index) => {
                setTimeout(() => { item.style.opacity = "1"; item.style.transform = "scale(1)"; }, index * 25);
            });
            setTimeout(() => { text.style.opacity = "1"; }, 4000);
            setTimeout(() => {
                wall.style.opacity = "0"; text.style.opacity = "0";
                setTimeout(initUniverse, 2000);
            }, 9000);
        }

        function initUniverse() {
            document.getElementById('main-universe').style.display = "block";
            setTimeout(() => {
                document.getElementById('main-universe').style.opacity = "1";
                document.getElementById('clock-container').style.opacity = "1";
                document.getElementById('clock-container').style.filter = "blur(0px)";
                animateClock();
            }, 100);
        }

        function animateClock() {
            const hHand = document.getElementById('hour-hand');
            const mHand = document.getElementById('min-hand');
            hHand.style.transform = `translate(-50%, 0) rotate(300deg)`;
            mHand.style.transform = `translate(-50%, 0) rotate(60deg)`;

            setTimeout(() => {
                hHand.style.transform = `translate(-50%, 0) rotate(360deg)`;
                mHand.style.transform = `translate(-50%, 0) rotate(360deg)`;
                
                setTimeout(() => {
                    const clock = document.getElementById('clock-container');
                    clock.style.top = "20%";
                    clock.style.transform = "translate(-50%, -50%) scale(0.6)";
                    
                    // Arayüzü Göster
                    setTimeout(() => {
                        document.getElementById('content-ui').style.opacity = "1";
                        startTimers();
                        // Final Mesajı en son belirsizce gelsin
                        setTimeout(() => { document.getElementById('final-msg').style.opacity = "1"; }, 3000);
                    }, 1500);
                }, 3000);
            }, 3000);
        }

        // SAYAÇ MANTIĞI
        function startTimers() {
            const birthDate = new Date("2009-04-04T00:00:00");
            const loveDate = new Date("2023-01-01T00:00:00");

            setInterval(() => {
                const now = new Date();
                
                // Yaşam Sayacı
                const lifeDiff = now - birthDate;
                document.getElementById('life-timer').innerHTML = formatTime(lifeDiff);

                // Aşk Sayacı
                const loveDiff = now - loveDate;
                document.getElementById('love-timer').innerHTML = formatTime(loveDiff);
            }, 1000);
        }

        function formatTime(ms) {
            const totalSecs = Math.floor(ms / 1000);
            const years = Math.floor(totalSecs / (365 * 24 * 3600));
            const days = Math.floor((totalSecs % (365 * 24 * 3600)) / (24 * 3600));
            const hours = Math.floor((totalSecs % (24 * 3600)) / 3600);
            const mins = Math.floor((totalSecs % 3600) / 60);
            const secs = totalSecs % 60;
            return `${years} Yıl ${days} Gün<br>${hours} Saat ${mins} Dakika ${secs} Saniye`;
        }
    </script>
</body>
</html>
